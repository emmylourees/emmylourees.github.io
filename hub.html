<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Pink URL bar on mobile -->
  <meta name="theme-color" content="#c8a4cc">

  <title>Emmylou's World</title>

  <meta name="description" content="Art, posters, collage, performance, zines, and music by Emily Louise Rees.">
  <meta name="author" content="Emily Louise Rees">

  <!-- Social / Open Graph -->
  <meta property="og:type" content="website">
  <meta property="og:title" content="Emmylou's World">
  <meta property="og:description" content="Art, posters, collage, performance, zines, and music by Emily Louise Rees.">
  <meta property="og:url" content="https://emmylourees.github.io/hub.html">
  <meta property="og:image" content="https://emmylourees.github.io/assets/images/hub/og_image.png">
  <meta name="twitter:card" content="summary_large_image">

  <!-- Shared design system -->
  <link rel="stylesheet" href="css/style.css">

  <!-- Hub page styles -->
  <link rel="stylesheet" href="css/pages/hub.css">
</head>

<body>
  <div class="page">

    <!-- Hand-lettered title: "EMMYLOU'S WORLD" — links back to this page as the site logo -->
    <a href="hub.html" class="hub-logo hub-title">
      <img
        src="assets/images/hub/emmylous_world_logo.png"
        alt="Emmylou's World"
      >
    </a>

    <!-- Flex row: nav list on left, portrait on right -->
    <div class="hub-inner">

      <!-- Navigation list — all links are hand-lettered images -->
      <nav aria-label="Main navigation">
        <ul class="hub-nav">

          <li>
            <a href="pages/about.html">
              <img
                class="hub-nav-img"
                src="assets/images/hub/nav_about.png"
                alt="About"
                loading="lazy"
              >
            </a>
          </li>

          <li>
            <a href="pages/collage.html">
              <img
                class="hub-nav-img"
                src="assets/images/hub/nav_collage.png"
                alt="Collage"
                loading="lazy"
              >
            </a>
          </li>

          <li>
            <a href="pages/performance.html">
              <img
                class="hub-nav-img"
                src="assets/images/hub/nav_performance.png"
                alt="Performance"
                loading="lazy"
              >
            </a>
          </li>

          <li>
            <a href="pages/posters.html">
              <img
                class="hub-nav-img"
                src="assets/images/hub/nav_posters.png"
                alt="Posters"
                loading="lazy"
              >
            </a>
          </li>

          <li>
            <a href="pages/zines.html">
              <img
                class="hub-nav-img"
                src="assets/images/hub/nav_zines.png"
                alt="Zines"
                loading="lazy"
              >
            </a>
          </li>

          <li>
            <a href="pages/music.html">
              <img
                class="hub-nav-img"
                src="assets/images/hub/nav_music.png"
                alt="Music"
                loading="lazy"
              >
            </a>
          </li>

        </ul>
      </nav>

      <!-- Illustrated portrait of Emmylou. Gets a gentle random rotation on load. -->
      <img
        class="hub-portrait"
        src="assets/images/hub/me.png"
        alt="Portrait of Emmylou"
        data-rotate
      >

    </div><!-- /.hub-inner -->

  </div><!-- /.page -->

  <!-- Shared utilities: random rotation on data-rotate elements -->
  <script src="js/main.js"></script>
</body>
</html>
