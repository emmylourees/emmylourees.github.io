<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Pink URL bar on mobile -->
  <meta name="theme-color" content="#c8a4cc">

  <title>Posters — Emmylou's World</title>

  <!-- Shared design system -->
  <link rel="stylesheet" href="../css/style.css">

  <!-- Posters page styles -->
  <link rel="stylesheet" href="../css/pages/posters.css">
</head>

<body>
  <div class="page">

    <!-- Page header: section title left, site logo centre -->
    <div class="page-header">
      <img
        src="../assets/images/hub/nav_posters.png"
        class="page-title"
        alt="Posters"
      >
      <a href="../hub.html" class="site-logo-link" aria-label="Back to Emmylou's World">
        <img
          src="../assets/images/hub/emmylous_world_logo.png"
          alt="Emmylou's World"
        >
      </a>
      <!-- Right column intentionally empty to balance the 3-column header grid -->
      <div></div>
    </div>

    <!-- Poster grid. Thumbnails load immediately; full-size only loads when clicked. -->
    <div class="posters-grid">

      <a href="#" class="lightbox-trigger" data-src="../assets/images/posters/marontate_poster.jpg">
        <img src="../assets/images/posters/marontate_poster_thumb.jpg" alt="Lucy's Delirium, Marontate, Roxanne Izzo poster" loading="lazy">
      </a>

      <a href="#" class="lightbox-trigger" data-src="../assets/images/posters/birds_poster.jpg">
        <img src="../assets/images/posters/birds_poster_thumb.jpg" alt="Frown Line, Birds of Prrrey, Hole in Heaven poster" loading="lazy">
      </a>

      <a href="#" class="lightbox-trigger" data-src="../assets/images/posters/clay_poster.jpg">
        <img src="../assets/images/posters/clay_poster_thumb.png" alt="Clay Hazey, Letchi, KT and Adam poster" loading="lazy">
      </a>

      <a href="#" class="lightbox-trigger" data-src="../assets/images/posters/emmylou_poster.jpg">
        <img src="../assets/images/posters/emmylou_poster_thumb.jpg" alt="Emmylou Rees and Salty Thumb poster" loading="lazy">
      </a>

      <a href="#" class="lightbox-trigger" data-src="../assets/images/posters/roslyn_poster.jpg">
        <img src="../assets/images/posters/roslyn_poster_thumb.jpg" alt="Roslyn Hoppe, Rachella Wred, Catbug the Popstar poster" loading="lazy">
      </a>

      <a href="#" class="lightbox-trigger" data-src="../assets/images/posters/milk_poster.jpg">
        <img src="../assets/images/posters/milk_poster_thumb.jpg" alt="Mafuba, Dirty Milk, Louis Cza and Evy poster" loading="lazy">
      </a>

      <a href="#" class="lightbox-trigger" data-src="../assets/images/posters/goege_poster.jpg">
        <img src="../assets/images/posters/goege_poster_thumb.jpg" alt="Mafuba and The Chris George Project poster" loading="lazy">
      </a>

      <a href="#" class="lightbox-trigger" data-src="../assets/images/posters/maya_poster.jpg">
        <img src="../assets/images/posters/maya_poster_thumb.jpg" alt="Rachella Wred, Maya Lucina, Aaron Wylder poster" loading="lazy">
      </a>

      <a href="#" class="lightbox-trigger" data-src="../assets/images/posters/sam_poster.jpg">
        <img src="../assets/images/posters/sam_poster_thumb.jpg" alt="Sam Ripat, Rachella Wred, Danny Pretzel, P'tit Ours poster" loading="lazy">
      </a>

      <a href="#" class="lightbox-trigger" data-src="../assets/images/posters/cajun_poster.png">
        <img src="../assets/images/posters/cajun_poster_thumb.png" alt="Cajun Dance and Open Jam poster" loading="lazy">
      </a>

    </div><!-- /.posters-grid -->

  </div><!-- /.page -->

  <!-- Lightbox overlay — hidden until a poster is clicked -->
  <div class="lightbox-overlay" id="lightbox" role="dialog" aria-modal="true" aria-label="Image viewer" tabindex="-1">
    <img src="" alt="">
  </div>

  <!-- Lightbox open/close logic -->
  <script src="../js/lightbox.js"></script>
</body>
</html>
